---
- name: Ensure temp directory exists using Ansible module
  ansible.windows.win_file:
    path: C:\temp
    state: directory

- name: Create baseline hello.txt using Ansible module
  ansible.windows.win_copy:
    dest: C:\temp\hello.txt
    content: |
      GALAXY_ROLE_MODULE_TEST
      Created by ansible.windows.win_copy

- name: Download gabagool.uk HTML content to hello.txt using shell
  ansible.windows.win_shell: |
    $url = "https://gabagool.uk"
    $output = "C:\temp\hello.txt"

    try {
      $response = Invoke-WebRequest -Uri $url -UseBasicParsing
      Add-Content -Path $output -Value "`n--- Downloaded HTML ---`n"
      Add-Content -Path $output -Value $response.Content
    } catch {
      Add-Content -Path $output -Value "`nREQUEST_FAILED: $($_.Exception.Message)"
      exit 1
    }

- name: Check hello.txt exists using Ansible module
  ansible.windows.win_stat:
    path: C:\temp\hello.txt
  register: hello_stat

- name: Show hello.txt metadata
  ansible.builtin.debug:
    var: hello_stat.stat
