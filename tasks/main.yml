---
- name: Ensure temp directory exists
  ansible.windows.win_shell: |
    New-Item -Path "C:\temp" -ItemType Directory -Force

- name: Download gabagool.uk HTML content to hello.txt
  ansible.windows.win_shell: |
    $url = "https://gabagool.uk"
    $output = "C:\temp\hello.txt"

    try {
      $response = Invoke-WebRequest -Uri $url -UseBasicParsing
      Set-Content -Path $output -Value $response.Content -Encoding UTF8
    } catch {
      Set-Content -Path $output -Value "REQUEST_FAILED: $($_.Exception.Message)" -Encoding UTF8
      exit 1
    }
